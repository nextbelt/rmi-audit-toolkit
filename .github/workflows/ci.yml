name: RMI Audit Toolkit CI

on:
  push:
    branches: [main, stage]
  pull_request:
    branches: [main, stage]

# Cancel in-progress runs when a new commit is pushed to the same branch / PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  # Safe CI-only values — real secrets must never appear here
  CI_SECRET_KEY: "ci-only-key-with-sufficient-length-0123456789abcdefghijk"
  CI_DATABASE_URL: "sqlite:///:memory:"

# ─────────────────────────────────────────────────────────────────────────────
# JOB DEPENDENCY GRAPH
#
#   security-gate (Fail-Fast)
#       ├── legacy-platform-gate
#       ├── bandit-scan
#       ├── frontend-check
#       └── migration-tests
#               ├── critical-regression
#               └── rls-isolation
#                       └── backend-tests (Full Suite)  ← final merge gate
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. GATE ─────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gates (Fail-Fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets-shaped files in git history
        run: |
          set -e
          BAD=$(git ls-files | grep -E '(^|/)(supa_vars|.+_secrets|.+_credentials)\.json$' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Secrets-shaped files are tracked in the repo:"
            echo "$BAD"
            exit 1
          fi

      - name: Scan commits for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # warn now; remove after baseline is clean

  # ── 2. PARALLEL FAST JOBS (all need: security-gate) ─────────────────────

  legacy-platform-gate:
    name: Legacy Platform Gate
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: V1 models — create + round-trip
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENVIRONMENT: development
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: pytest tests/test_legacy_platform.py -v --tb=short

  bandit-scan:
    name: Bandit Code Security Scan
    runs-on: ubuntu-latest
    needs: security-gate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit (medium severity and above)
        run: bandit -r backend/ -ll --exclude backend/tests -f json -o bandit-report.json
        continue-on-error: true   # surfaced as warning; tighten after addressing existing findings

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  frontend-check:
    name: frontend-check
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --omit=dev || true
        continue-on-error: true

  migration-tests:
    name: Migration Forward + Rollback Tests
    runs-on: ubuntu-latest
    needs: security-gate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Forward migration — create all tables
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENVIRONMENT: development
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: pytest backend/tests/test_migrations.py::test_forward_migration_creates_all_tables -v --tb=short

      - name: Rollback + recreate — idempotency check
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENVIRONMENT: development
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: pytest backend/tests/test_migrations.py::test_rollback_and_recreate_is_idempotent -v --tb=short

  # ── 3. CRITICAL JOBS (both need: migration-tests) ────────────────────────

  critical-regression:
    name: Critical Regression Tests (MANDATORY)
    runs-on: ubuntu-latest
    needs: [security-gate, migration-tests]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Scoring policy, secret hardening, upload safety
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENVIRONMENT: development
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: |
          pytest tests/test_scoring_evidence_cap.py \
                 tests/test_secret_check.py \
                 tests/test_security_utils.py \
                 tests/test_upload_safety.py \
                 -v --tb=short

  rls-isolation:
    name: RLS Isolation Tests (CRITICAL)
    runs-on: ubuntu-latest
    needs: [security-gate, migration-tests]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Per-assessment ownership isolation + auth routes
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENVIRONMENT: development
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: |
          pytest tests/test_rbac.py tests/test_auth_routes.py -v --tb=short

  # ── 4. MERGE GATE ────────────────────────────────────────────────────────

  backend-tests:
    name: Backend Tests (Full Suite)
    runs-on: ubuntu-latest
    needs:
      - legacy-platform-gate
      - bandit-scan
      - frontend-check
      - critical-regression
      - rls-isolation
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Full pytest suite
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENVIRONMENT: development
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: pytest -q --tb=short

      - name: Dependency CVE audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln GHSA-wj6h-64fc-37mp || true
        continue-on-error: true

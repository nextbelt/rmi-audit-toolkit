name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Audit dependencies for known CVEs
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln GHSA-wj6h-64fc-37mp || true
        continue-on-error: true

      - name: Run pytest
        env:
          SECRET_KEY: ci-test-key-with-sufficient-length-0123456789-abcdefg
          ENVIRONMENT: development
          DATABASE_URL: sqlite:///:memory:
        run: pytest

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --omit=dev || true
        continue-on-error: true

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if known leak filenames are tracked
        run: |
          set -e
          BAD=$(git ls-files | grep -E '(^|/)(supa_vars|.+_secrets|.+_credentials)\.json$' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Secrets-shaped files tracked in repo:"
            echo "$BAD"
            exit 1
          fi
